<nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <div class="wrapper d-flex justify-content-between w-100 m-3">
      <div class="titulo">
        <h4 class="fw-bolder">{{ titulo }}</h4>
        <span class="text-body-tertiary fs-6">{{ subtitulo }}</span>
      </div>

      <div class="perfil-btn">
        <button
          *ngIf="isProjetosRoute"
          class="btn btn-primary fw-bolder p-2 m-2"
          type="button"
          (click)="onNovoProjetoClick()"
        >
          <fa-icon [icon]="faPlus"></fa-icon>
          Novo projeto
        </button>
        <div class="icons d-inline-flex">
          <fa-icon class="mx-2 text-secondary" [icon]="faNotification" />
          <button
            type="button"
            class="nav-icon-btn"
            [class.active]="isKanbanRoute"
            [disabled]="!isKanbanRoute"

            title="Pesquisar tarefas"
          >
            <fa-icon class="text-secondary" [icon]="faSearch" />
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
